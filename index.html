<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>株AI分析ツール</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:30px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:30px;
}

</style>

</head>

<body>

<h1>株AI分析ツール</h1>

<input id="ticker" placeholder="証券コード 例 7203">

<button onclick="analyze()">分析</button>

<div id="result"></div>

<div id="chart" style="height:500px;margin-top:40px"></div>

<script>

async function analyze(){

const ticker=document.getElementById("ticker").value
const result=document.getElementById("result")

result.innerHTML="読み込み中..."

const res=await fetch("/api/analyze",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({ticker})
})

const data=await res.json()

result.innerHTML=`

<h2>${data.name}</h2>

株価: ${data.price}<br>
PER: ${data.per}<br>
PBR: ${data.pbr}<br>
時価総額: ${data.marketCap}

<h3>AI分析</h3>
<p>${data.analysis}</p>

`

new TradingView.widget({
container_id:"chart",
autosize:true,
symbol:`TSE:${ticker}`,
interval:"D",
timezone:"Asia/Tokyo",
theme:"light",
style:"1",
locale:"ja"
})

}

</script>

</body>
</html>

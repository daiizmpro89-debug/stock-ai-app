<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>株AI分析</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
font-family:Arial, sans-serif;
max-width:900px;
margin:auto;
padding:20px;
}

input{
padding:10px;
font-size:16px;
width:200px;
}

button{
padding:10px 15px;
font-size:16px;
cursor:pointer;
}

.card{
border:1px solid #ddd;
padding:15px;
margin-top:20px;
border-radius:8px;
}

.loading{
color:gray;
}
</style>
</head>

<body>

<h1>株AI分析ツール</h1>

<input id="code" placeholder="証券コード 7203">
<button onclick="analyze()">分析</button>

<div id="result"></div>

<div id="chart" style="height:500px;margin-top:20px;"></div>

<script>

async function analyze(){

const code = document.getElementById("code").value.trim();

if(!code){
alert("証券コードを入力してください");
return;
}

document.getElementById("result").innerHTML="<p class='loading'>読み込み中...</p>";
document.getElementById("chart").innerHTML="";

try{

const res = await fetch(`/api/analyze?code=${code}`);

if(!res.ok){
throw new Error("APIエラー");
}

const data = await res.json();

// ★ APIに合わせて修正
document.getElementById("result").innerHTML = `

<div class="card">

<h2>${data.company || "企業名不明"}</h2>

株価: ${data.price ?? "N/A"}

</div>

<div class="card">

<h3>AI分析</h3>

<pre>${data.analysis || "分析なし"}</pre>

</div>

`;

// ★ TradingViewチャート
new TradingView.widget({
container_id:"chart",
autosize:true,
symbol:`TSE:${code}`,
interval:"D",
timezone:"Asia/Tokyo",
theme:"light",
style:"1",
locale:"ja",
enable_publishing:false
});

}catch(err){

document.getElementById("result").innerHTML =
"<p>エラーが発生しました</p>";

console.error(err);

}

}

</script>

</body>
</html>

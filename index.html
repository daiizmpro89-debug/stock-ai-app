<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>株AI分析</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
font-family:Arial, sans-serif;
max-width:900px;
margin:auto;
padding:20px;
font-size:20px; /* ← 全体大きく */
}

h1{ font-size:32px; }
h2{ font-size:26px; }
h3{ font-size:22px; }

input{
padding:12px;
font-size:18px;
width:220px;
}

button{
padding:12px 18px;
font-size:18px;
cursor:pointer;
}

.card{
border:1px solid #ddd;
padding:20px;
margin-top:20px;
border-radius:10px;
font-size:20px;
line-height:1.7;
}

pre{
font-size:18px;
white-space:pre-wrap;
}

</style>
</head>

<body>

<h1>株AI分析ツール</h1>

<input id="code" placeholder="証券コード 7203">
<button onclick="analyze()">分析</button>

<div id="result"></div>
<div id="chart" style="height:500px;margin-top:20px;"></div>

<script>

async function analyze(){

const code = document.getElementById("code").value.trim();

if(!code){
alert("証券コードを入力してください");
return;
}

document.getElementById("result").innerHTML="読み込み中...";
document.getElementById("chart").innerHTML="";

try{

const res = await fetch(`/api/analyze?code=${code}`);
const data = await res.json();

document.getElementById("result").innerHTML = `

<div class="card">
<h2>${data.company}</h2>
株価: ${data.price}
</div>

<div class="card">
<h3>AI分析</h3>
<pre>${data.analysis}</pre>
</div>

`;

new TradingView.widget({
container_id:"chart",
autosize:true,
symbol:`TSE:${code}`,
interval:"D",
timezone:"Asia/Tokyo",
theme:"light",
style:"1",
locale:"ja",
enable_publishing:false
});

}catch(err){
document.getElementById("result").innerHTML="エラーが発生しました";
}

}

</script>

</body>
</html>
